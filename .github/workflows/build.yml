name: Build executables

# Builds standalone Windows, macOS and Linux executables.
# Runs on demand, and on version tags it also attaches them to a GitHub Release.
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            asset: tvtime-rescue-windows.exe
            built: dist/tvtime-rescue.exe
          - os: macos-latest
            asset: tvtime-rescue-macos
            built: dist/tvtime-rescue
          - os: ubuntu-latest
            asset: tvtime-rescue-linux
            built: dist/tvtime-rescue
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build
        run: python scripts/build_exe.py

      - name: Rename for this platform
        shell: bash
        run: |
          mkdir -p out
          cp "${{ matrix.built }}" "out/${{ matrix.asset }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: out/${{ matrix.asset }}

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: out/${{ matrix.asset }}
